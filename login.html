<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход - Nikitosearch</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .auth-form {
            background-color: #000000;
            border-radius: 15px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .auth-form h2 {
            color: #FFA500;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #FFFFFF;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #FFA500;
            border-radius: 8px;
            background-color: #222;
            color: #FFFFFF;
            font-size: 16px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #FF8C00;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #FFA500;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #FF8C00;
            transform: translateY(-2px);
        }
        
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #CCCCCC;
        }
        
        .auth-link a {
            color: #FFA500;
            text-decoration: none;
        }
        
        .auth-link a:hover {
            text-decoration: underline;
        }
        
        .message {
            background-color: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        footer {
            background-color: #000000;
            padding: 20px 0;
            text-align: center;
            margin-top: auto;
        }
        
        footer a {
            color: #FFFFFF;
            text-decoration: none;
            margin: 0 15px;
        }
        
        footer a:hover {
            color: #FFA500;
        }
        
        .footer-note p {
            color: #CCCCCC;
            font-size: 14px;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html">Главная</a>
        <a href="games.html">Игры</a>
        <a href="items.html">Предметы</a>
        <a href="graphics.html">Графика</a>
        <a href="characters.html">Персонажи</a>
        <a href="reviews.html">Отзывы</a>
    </nav>

    <div class="auth-container">
        <div class="auth-form">
            <h2>Вход в аккаунт</h2>
            
            <div id="errorMessage" class="message"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Ваш email" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <div class="auth-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="login.html">Вход</a>
            <a href="register.html">Регистрация</a>
            <a href="mailto:akimivanov02@gmail.com">Связь с нами</a>
        </div>
        <div class="footer-note">
            <p>© 2026 ООО Босс Никитосс</p>
        </div>
    </footer>

    <script>
        // Получаем элементы
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        
        // Обработчик отправки формы
        loginForm.addEventListener('submit', function(event) {
            event.preventDefault();
            
            // Получаем значения
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            // Скрываем предыдущее сообщение
            errorMessage.style.display = 'none';
            
            // Проверяем, что поля не пустые
            if (!email || !password) {
                showError('Пожалуйста, заполните все поля');
                return;
            }
            
            // Получаем список пользователей из localStorage
            let users = localStorage.getItem('users');
            
            // Если нет зарегистрированных пользователей
            if (!users) {
                showError('Аккаунт не найден. Пожалуйста, зарегистрируйтесь сначала.');
                return;
            }
            
            // Преобразуем строку в массив
            const usersArray = JSON.parse(users);
            
            // Проверяем, есть ли зарегистрированные пользователи
            if (usersArray.length === 0) {
                showError('Аккаунт не найден. Пожалуйста, зарегистрируйтесь.');
                return;
            }
            
            // Ищем пользователя
            const foundUser = usersArray.find(user => user.email === email && user.password === password);
            
            if (foundUser) {
                // Сохраняем информацию о текущем пользователе
                localStorage.setItem('currentUser', JSON.stringify({
                    username: foundUser.username,
                    email: foundUser.email
                }));
                
                // Показываем сообщение об успехе
                errorMessage.style.backgroundColor = '#4CAF50';
                errorMessage.textContent = 'Вход выполнен успешно! Перенаправление...';
                errorMessage.style.display = 'block';
                
                // Перенаправляем на главную через 1.5 секунды
                setTimeout(function() {
                    window.location.href = 'index.html';
                }, 1500);
            } else {
                showError('Неверный email или пароль. Попробуйте снова или зарегистрируйтесь.');
            }
        });
        
        // Функция показа ошибки
        function showError(message) {
            errorMessage.style.backgroundColor = '#ff4444';
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
