<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Вход - Nikitosearch</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
        }

        body {
            display: flex;
            flex-direction: column;
            background-color: #FFA500;
            font-family: Arial, sans-serif;
        }

        /* === ВЕРХНЕЕ МЕНЮ (ЧЕРНАЯ ПОЛОСА) === */
        .top-nav {
            background-color: #000000;
            padding: 15px 0;
            text-align: center;
        }

        .top-nav a {
            color: #FFFFFF;
            text-decoration: none;
            margin: 0 15px;
            font-size: 16px;
            font-weight: bold;
            display: inline-block;
        }

        .top-nav a:hover {
            color: #FFA500;
        }

        /* === ФОРМА ВХОДА === */
        .auth-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        
        .auth-form {
            background-color: #000000;
            border-radius: 15px;
            padding: 40px 20px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        
        .auth-form h2 {
            color: #FFA500;
            text-align: center;
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .input-group {
            margin-bottom: 20px;
        }
        
        .input-group label {
            display: block;
            color: #FFFFFF;
            margin-bottom: 8px;
            font-size: 14px;
        }
        
        .input-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #FFA500;
            border-radius: 8px;
            background-color: #222;
            color: #FFFFFF;
            font-size: 16px;
        }
        
        .input-group input:focus {
            outline: none;
            border-color: #FF8C00;
        }
        
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #FFA500;
            color: #000000;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        
        .btn:hover {
            background-color: #FF8C00;
        }
        
        .auth-link {
            text-align: center;
            margin-top: 20px;
            color: #CCCCCC;
        }
        
        .auth-link a {
            color: #FFA500;
            text-decoration: none;
        }
        
        .message {
            background-color: #ff4444;
            color: white;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
            display: none;
        }
        
        /* === ФУТЕР === */
        footer {
            background-color: #000000;
            padding: 20px 0;
            margin-top: 50px;
            text-align: center;
        }
        
        footer a {
            color: #FFFFFF;
            text-decoration: none;
            margin: 0 15px;
            display: inline-block;
        }
        
        footer a:hover {
            color: #FFA500;
        }
        
        .footer-links {
            margin-bottom: 15px;
        }
        
        .footer-note p {
            margin: 5px 0;
            font-size: 14px;
            color: #CCCCCC;
        }
        
        /* === ДЛЯ ТЕЛЕФОНОВ === */
        @media (max-width: 768px) {
            .top-nav a {
                margin: 0 8px;
                font-size: 14px;
            }
            
            .auth-form {
                padding: 30px 20px;
            }
            
            .auth-form h2 {
                font-size: 24px;
            }
        }
    </style>
</head>
<body>
    <nav class="top-nav">
        <a href="index.html">Главная</a>
        <a href="games.html">Игры</a>
        <a href="items.html">Предметы</a>
        <a href="graphics.html">Графика</a>
        <a href="characters.html">Персонажи</a>
        <a href="reviews.html">Отзывы</a>
    </nav>

    <div class="auth-container">
        <div class="auth-form">
            <h2>Вход в аккаунт</h2>
            
            <div id="errorMessage" class="message"></div>
            
            <form id="loginForm">
                <div class="input-group">
                    <label>Email</label>
                    <input type="email" id="email" placeholder="Ваш email" required>
                </div>
                <div class="input-group">
                    <label>Пароль</label>
                    <input type="password" id="password" placeholder="Введите пароль" required>
                </div>
                <button type="submit" class="btn">Войти</button>
            </form>
            <div class="auth-link">
                Нет аккаунта? <a href="register.html">Зарегистрироваться</a>
            </div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="login.html">Вход</a>
            <a href="register.html">Регистрация</a>
            <a href="mailto:akimivanov02@gmail.com">Связь с нами</a>
        </div>
        <div class="footer-note">
            <p>© 2026 ООО Босс Никитосс</p>
        </div>
    </footer>

    <script src="config.js"></script>
    <script>
        const loginForm = document.getElementById('loginForm');
        const errorMessage = document.getElementById('errorMessage');
        
        loginForm.addEventListener('submit', async function(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            errorMessage.style.display = 'none';
            
            if (!email || !password) {
                showError('Пожалуйста, заполните все поля');
                return;
            }
            
            try {
                // Ищем пользователя в Supabase
                const response = await fetch(`${SUPABASE_URL}/rest/v1/users?email=eq.${encodeURIComponent(email)}&password=eq.${encodeURIComponent(password)}`, {
                    method: 'GET',
                    headers: {
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`
                    }
                });
                
                const users = await response.json();
                
                if (users.length > 0) {
                    const user = users[0];
                    // Сохраняем информацию о текущем пользователе
                    localStorage.setItem('currentUser', JSON.stringify({
                        username: user.username,
                        email: user.email
                    }));
                    
                    errorMessage.style.backgroundColor = '#4CAF50';
                    errorMessage.textContent = 'Вход выполнен успешно! Перенаправление...';
                    errorMessage.style.display = 'block';
                    
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1500);
                } else {
                    showError('Неверный email или пароль. Попробуйте снова.');
                }
            } catch (error) {
                showError('Ошибка подключения к серверу. Проверьте интернет.');
            }
        });
        
        function showError(message) {
            errorMessage.style.backgroundColor = '#ff4444';
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
    </script>
</body>
</html>
